<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <nav><button>Home</button><button>Menu</button><button>About</button></nav>
    </header>
    <main id="content">
        <!-- .home (Page Wrapper) -->
        <div class="home">

            <!-- .hero -->
            <section class="hero">
            <img
                class="hero-img"
                src="https://picsum.photos/1200/400"
                alt=""
                aria-hidden="true"
            />

            <h1>Welcome to Tony's Authentic Pizzas</h1>

            <p class="blurb">
                Fresh ingredients, hand-tossed dough, and a recipe perfected over
                generations.
            </p>
            </section>

            <!-- .info-cta-section (Hours, Location, Call-To-Action) -->
            <section class="info-cta-section" aria-label="Restaurant info">

            <div class="info-row">
                <strong>Hours:</strong> Mon–Fri 11–10, Sat–Sun 12–11
            </div>

            <div class="info-row">
                <strong>Location:</strong> 123 Pizza Lane, Foodtown, CA 90210
            </div>

            <button class="cta" type="button">Order Now</button>

            </section>

        </div>
    </main>
</body>
</html>
